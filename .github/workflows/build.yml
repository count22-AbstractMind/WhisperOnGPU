name: Compilar WhisperDesktopNG (GGML)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - uses: microsoft/setup-msbuild@v2
    - uses: nuget/setup-nuget@v2

    - name: Restaurar pacotes
      run: |
        nuget restore Whisper.sln
        dotnet restore Whisper.sln

    - name: Compilar shaders
      run: msbuild ComputeShaders\ComputeShaders.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Compactar shaders
      run: dotnet run --project Tools\CompressShaders\CompressShaders.csproj --configuration Release

    # Compilação principal: MSBuild resolve dependências se houver referências
    - name: Compilar solução completa
      run: msbuild Whisper.sln /p:Configuration=Release /p:Platform=x64 /v:minimal /m

    # Fallback: se ainda houver erro, copia o cabeçalho e recompila o WhisperDesktop
    - name: (Fallback) Copiar whisperWindows.h e recompilar WhisperDesktop
      if: failure()  # só executa se a etapa anterior falhou
      run: |
        if exist Whisper\whisperWindows.h copy Whisper\whisperWindows.h Examples\WhisperDesktop\
        if exist Whisper\x64\Release\whisperWindows.h copy Whisper\x64\Release\whisperWindows.h Examples\WhisperDesktop\
        msbuild Examples\WhisperDesktop\WhisperDesktop.vcxproj /p:Configuration=Release /p:Platform=x64 /p:AdditionalIncludeDirectories="$(ProjectDir)..\..\Whisper\;$(ProjectDir)..\..\Whisper\x64\Release\;%24(AdditionalIncludeDirectories)"

    - name: Listar arquivos gerados
      run: |
        echo "=== DLLs ==="
        dir /s Whisper\x64\Release\Whisper.dll
        echo "=== Executáveis ==="
        dir /s Examples\main\x64\Release\main.exe
        dir /s Examples\WhisperDesktop\x64\Release\WhisperDesktop.exe

    - name: Upload dos binários
      uses: actions/upload-artifact@v4
      with:
        name: WhisperDesktopNG-Binaries
        path: |
          Whisper\x64\Release\Whisper.dll
          Examples\main\x64\Release\main.exe
          Examples\WhisperDesktop\x64\Release\WhisperDesktop.exe
          **/x64/Release/*.dll
