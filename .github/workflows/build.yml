name: Compilar WhisperDesktopNG (com GGML)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - uses: microsoft/setup-msbuild@v2
    - uses: nuget/setup-nuget@v2

    - name: Restaurar pacotes
      run: |
        nuget restore Whisper.sln
        dotnet restore Whisper.sln

    - name: 1. Compilar shaders
      run: msbuild ComputeShaders\ComputeShaders.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 2. Compactar shaders
      run: dotnet run --project Tools\CompressShaders\CompressShaders.csproj --configuration Release

    - name: 3. Compilar GGML
      run: msbuild GGML\GGML.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 4. Compilar Whisper (DLL)
      run: msbuild Whisper\Whisper.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 5. Compilar executáveis (main e WhisperDesktop)
      run: |
        msbuild Examples\main\main.vcxproj /p:Configuration=Release /p:Platform=x64
        msbuild Examples\WhisperDesktop\WhisperDesktop.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 6. Listar arquivos gerados
      run: |
        echo "=== DLLs ==="
        dir /s Whisper\x64\Release\Whisper.dll
        echo "=== Executáveis ==="
        dir /s Examples\main\x64\Release\main.exe
        dir /s Examples\WhisperDesktop\x64\Release\WhisperDesktop.exe
        echo "=== Outras DLLs (dependências) ==="
        dir /s Examples\WhisperDesktop\x64\Release\*.dll

    - name: Upload dos binários
      uses: actions/upload-artifact@v4
      with:
        name: WhisperDesktopNG-Binaries
        path: |
          Whisper\x64\Release\Whisper.dll
          Examples\main\x64\Release\main.exe
          Examples\WhisperDesktop\x64\Release\WhisperDesktop.exe
          **/x64/Release/*.dll
