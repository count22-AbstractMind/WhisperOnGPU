name: Compilar WhisperDesktopNG (GGML + Quantização)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Baixar código-fonte com submódulos
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - name: Configurar MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configurar NuGet
      uses: nuget/setup-nuget@v2

    - name: Restaurar pacotes NuGet
      run: nuget restore Whisper.sln

    - name: Restaurar projetos .NET
      run: dotnet restore Whisper.sln

    - name: 1. Compilar ComputeShaders
      run: msbuild ComputeShaders\ComputeShaders.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 2. Compactar Shaders
      run: dotnet run --project Tools\CompressShaders\CompressShaders.csproj --configuration Release

    - name: 3. Compilar GGML (biblioteca estática)
      run: msbuild GGML\GGML.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal

    - name: 4. Configurar Whisper.vcxproj para usar GGML
      shell: pwsh
      run: |
        $proj = "Whisper\Whisper.vcxproj"
        $xml = [xml](Get-Content $proj)
        $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
        $ns.AddNamespace("msb", "http://schemas.microsoft.com/developer/msbuild/2003")

        foreach ($cfg in $xml.Project.ItemDefinitionGroup) {
          $cl = $cfg.ClCompile
          if ($cl) {
            $defs = $cl.PreprocessorDefinitions
            if ($defs) {
              $text = $defs.InnerText
              if ($text -and (-not $text.Contains("WHISPER_USE_GGML"))) {
                $defs.InnerText = "WHISPER_USE_GGML;" + $text
              }
            }
          }
          $link = $cfg.Link
          if ($link) {
            $deps = $link.AdditionalDependencies
            if ($deps) {
              $text = $deps.InnerText
              if ($text -and (-not $text.Contains("ggml.lib"))) {
                $deps.InnerText = "ggml.lib;" + $text
              }
            }
          }
        }
        $xml.Save($proj)

    - name: 5. Compilar Whisper (DLL com GGML)
      run: msbuild Whisper\Whisper.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal

    - name: 6. Copiar whisperWindows.h para o projeto WhisperDesktop
      shell: pwsh
      run: |
        # O arquivo está em API\whisperWindows.h (conforme o .vcxproj)
        $source = "API\whisperWindows.h"
        if (Test-Path $source) {
          Copy-Item $source Examples\WhisperDesktop\ -Force
          Write-Host "Copiado $source para Examples\WhisperDesktop\"
        } else {
          # Fallback: busca recursiva
          $found = Get-ChildItem -Recurse -Filter whisperWindows.h | Select-Object -First 1
          if ($found) {
            Copy-Item $found.FullName Examples\WhisperDesktop\ -Force
            Write-Host "Copiado $($found.FullName) para Examples\WhisperDesktop\"
          } else {
            Write-Host "::error::whisperWindows.h não encontrado em lugar nenhum."
            exit 1
          }
        }

    - name: 7. Compilar executáveis (main e WhisperDesktop)
      run: |
        msbuild Examples\main\main.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal
        msbuild Examples\WhisperDesktop\WhisperDesktop.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal

    - name: 8. Listar arquivos gerados
      shell: pwsh
      run: |
        Write-Host "=== DLLs ==="
        Get-ChildItem -Recurse -Filter *.dll | ForEach-Object { "$($_.FullName) - Tamanho: $($_.Length) bytes" }
        Write-Host ""
        Write-Host "=== EXEs ==="
        Get-ChildItem -Recurse -Filter *.exe | ForEach-Object { "$($_.FullName) - Tamanho: $($_.Length) bytes" }

    - name: 9. Disponibilizar binários para download
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: WhisperDesktopNG-Binaries
        path: |
          **/x64/Release/*.dll
          **/x64/Release/*.exe
          **/Release/*.dll
          **/Release/*.exe

    - name: Enviar log de erros (se falhar)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: log-de-erros
        path: errors.log
        if-no-files-found: ignore
