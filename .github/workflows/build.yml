name: Compilar WhisperDesktop

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar Código
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configurar MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configurar NuGet
      uses: nuget/setup-nuget@v2

    - name: Restaurar Pacotes
      run: nuget restore WhisperCpp.sln

    - name: Compilar Solucao (Release x64)
      run: msbuild WhisperCpp.sln /p:Configuration=Release /p:Platform="x64"

    - name: Salvar Executavel
      uses: actions/upload-artifact@v4
      with:
        name: WhisperDesktop-Pronto
        path: |
          x64/Release/**/*
          **/bin/Release/**/*
          **/x64/Release/**/*
