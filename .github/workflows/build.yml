name: Compilar WhisperDesktopNG (com GGML)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - uses: microsoft/setup-msbuild@v2
    - uses: nuget/setup-nuget@v2

    - name: Restaurar pacotes
      run: |
        nuget restore Whisper.sln
        dotnet restore Whisper.sln

    - name: Compilar shaders
      run: msbuild ComputeShaders\ComputeShaders.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Compactar shaders
      run: dotnet run --project Tools\CompressShaders\CompressShaders.csproj --configuration Release

    - name: Compilar GGML (primeiro)
      run: msbuild GGML\GGML.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal

    - name: Verificar ggml.lib
      run: dir GGML\x64\Release\ggml.lib

    - name: Compilar Whisper (DLL)
      run: msbuild Whisper\Whisper.vcxproj /p:Configuration=Release /p:Platform=x64 /v:minimal

    - name: Compilar executáveis
      run: |
        msbuild Examples\main\main.vcxproj /p:Configuration=Release /p:Platform=x64
        msbuild Examples\WhisperDesktop\WhisperDesktop.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Listar DLLs geradas
      run: |
        echo "=== Whisper.dll ==="
        dir Whisper\x64\Release\Whisper.dll
        echo "=== Outras DLLs ==="
        dir Examples\WhisperDesktop\x64\Release\*.dll
        dir x64\Release\*.dll

    - name: Upload dos binários
      uses: actions/upload-artifact@v4
      with:
        name: Whisper-GGML-Binaries
        path: |
          Whisper\x64\Release\Whisper.dll
          Examples\main\x64\Release\main.exe
          Examples\WhisperDesktop\x64\Release\WhisperDesktop.exe
          **/x64/Release/*.dll
