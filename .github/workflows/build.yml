name: Compilar WhisperDesktopNG com Suporte a Quantização

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Baixar código-fonte com submódulos
      uses: actions/checkout@v4
      with:
        submodules: true          # 🔥 ESSENCIAL: baixa o whisper.cpp e ggml
        fetch-depth: 0            # Para garantir que pegue tudo

    - name: Configurar MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configurar NuGet
      uses: nuget/setup-nuget@v2

    - name: Restaurar pacotes NuGet
      run: nuget restore Whisper.sln

    - name: Restaurar projetos .NET
      run: dotnet restore Whisper.sln

    - name: 1. Compilar os Shaders da GPU
      shell: cmd
      run: msbuild ComputeShaders\ComputeShaders.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 2. Compactar Shaders (gera o recurso necessário)
      shell: cmd
      run: dotnet run --project Tools\CompressShaders\CompressShaders.csproj --configuration Release

    - name: 3. Compilar a biblioteca GGML (suporte a quantização)
      shell: cmd
      run: msbuild GGML\GGML.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 4. Compilar a Whisper.dll (com suporte a GGML)
      shell: cmd
      run: msbuild Whisper\Whisper.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 5. Compilar os executáveis (CLI e GUI)
      shell: cmd
      run: |
        msbuild Examples\main\main.vcxproj /p:Configuration=Release /p:Platform=x64
        msbuild Examples\WhisperDesktop\WhisperDesktop.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 6. Listar arquivos gerados (para depuração)
      shell: cmd
      run: |
        echo "=== Conteúdo do Whisper ==="
        dir /s Whisper\x64\Release\*.dll
        echo "=== Conteúdo do WhisperDesktop ==="
        dir /s Examples\WhisperDesktop\x64\Release\*.exe
        dir /s Examples\WhisperDesktop\x64\Release\*.dll
        echo "=== Conteúdo do main ==="
        dir /s Examples\main\x64\Release\*.exe

    - name: Disponibilizar binários para download
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: WhisperDesktopNG-Binaries
        path: |
          Whisper\x64\Release\Whisper.dll
          Examples\main\x64\Release\main.exe
          Examples\WhisperDesktop\x64\Release\WhisperDesktop.exe
          Examples\WhisperDesktop\x64\Release\*.dll
          **/x64/Release/*.dll

    - name: Enviar log se falhar
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: log-de-erros
        path: errors.log
        if-no-files-found: ignore
