name: Compilar WhisperDesktopNG com Suporte a Quantização

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Baixar código-fonte com submódulos
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - name: Configurar MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configurar NuGet
      uses: nuget/setup-nuget@v2

    - name: Restaurar pacotes NuGet
      run: nuget restore Whisper.sln

    - name: Restaurar projetos .NET
      run: dotnet restore Whisper.sln

    - name: 1. Compilar os Shaders da GPU
      shell: cmd
      run: msbuild ComputeShaders\ComputeShaders.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 2. Compactar Shaders (gerar recurso)
      shell: cmd
      run: dotnet run --project Tools\CompressShaders\CompressShaders.csproj --configuration Release

    - name: 3. Compilar toda a solução (resolve dependências)
      shell: cmd
      run: msbuild Whisper.sln /p:Configuration=Release /p:Platform=x64 /v:minimal /m

    - name: 4. Listar arquivos gerados (para depuração)
      shell: cmd
      run: |
        echo "=== DLLs ==="
        dir /s Whisper\x64\Release\*.dll
        echo "=== Executáveis ==="
        dir /s Examples\main\x64\Release\*.exe
        dir /s Examples\WhisperDesktop\x64\Release\*.exe

    - name: Disponibilizar binários para download
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: WhisperDesktopNG-Binaries
        path: |
          Whisper\x64\Release\Whisper.dll
          Examples\main\x64\Release\main.exe
          Examples\WhisperDesktop\x64\Release\WhisperDesktop.exe
          Examples\WhisperDesktop\x64\Release\*.dll
          **/x64/Release/*.dll

    - name: Enviar log se falhar
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: log-de-erros
        path: errors.log
        if-no-files-found: ignore
