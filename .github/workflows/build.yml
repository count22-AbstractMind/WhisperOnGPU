name: Compilar WhisperDesktop

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar Codigo
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Instalar C++ ATL e Aguardar Conclusao
      run: |
        Write-Host "Iniciando instalacao do componente ATL no Visual Studio..."
        $installer = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
        $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"

        # Inicia o instalador
        Start-Process -FilePath $installer -ArgumentList "modify --installPath `"$vsPath`" --add Microsoft.VisualStudio.Component.VC.ATL --quiet --norestart" -Wait

        # Aguarda os processos em segundo plano terminarem
        $timeout = 300
        $timer = 0
        While ((Get-Process -Name "vs_installer", "vs_installershell", "setup" -ErrorAction SilentlyContinue) -and ($timer -lt $timeout)) {
            Start-Sleep -Seconds 3
            $timer += 3
            Write-Host "Instalando ATL... ($timer segundos)"
        }

        # Confirma se a biblioteca realmente esta no disco
        $atlHeader = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Filter "atlcomcli.h" -Recurse -ErrorAction SilentlyContinue
        if ($atlHeader) {
            Write-Host "SUCESSO: ATL instalada em $($atlHeader.FullName)"
        } else {
            Write-Error "FALHA: O arquivo atlcomcli.h nao foi encontrado."
            exit 1
        }
      shell: powershell

    - name: Configurar Ambiente MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configurar MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configurar NuGet
      uses: nuget/setup-nuget@v2

    - name: Restaurar Pacotes
      run: nuget restore Examples\WhisperDesktop\WhisperDesktop.vcxproj

    - name: Compilar WhisperDesktop
      run: msbuild Examples\WhisperDesktop\WhisperDesktop.vcxproj /p:Configuration=Release /p:Platform="x64"

    - name: Salvar Executavel
      uses: actions/upload-artifact@v4
      with:
        name: WhisperDesktop-Pronto
        path: |
          **/x64/Release/**/*
          **/Release/**/*
