name: Compilar WhisperDesktop

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar Codigo
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Instalar Suporte C++ ATL no Servidor
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        Start-Process "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" -ArgumentList "modify --installPath `"$vsPath`" --add Microsoft.VisualStudio.Component.VC.ATL --quiet --norestart" -Wait
      shell: powershell

    - name: Configurar Ambiente MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configurar MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configurar NuGet
      uses: nuget/setup-nuget@v2

    - name: Restaurar Pacotes
      run: nuget restore Examples\WhisperDesktop\WhisperDesktop.vcxproj

    - name: Compilar WhisperDesktop
      run: msbuild Examples\WhisperDesktop\WhisperDesktop.vcxproj /p:Configuration=Release /p:Platform="x64"

    - name: Salvar Executavel
      uses: actions/upload-artifact@v4
      with:
        name: WhisperDesktop-Pronto
        path: |
          **/x64/Release/**/*
          **/Release/**/*
