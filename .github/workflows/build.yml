name: Compilar Whisper Customizado

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Baixar codigo-fonte
      uses: actions/checkout@v4

    - name: Configurar MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configurar NuGet
      uses: nuget/setup-nuget@v2

    - name: Restaurar pacotes NuGet
      run: nuget restore Whisper.sln   # <--- ALTERADO AQUI

    - name: Restaurar projetos .NET
      run: dotnet restore Whisper.sln   # <--- ALTERADO AQUI

    - name: 1. Compilar os Shaders da Placa de Video
      shell: cmd
      run: msbuild ComputeShaders\ComputeShaders.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: 2. Compactar Shaders (Gera o arquivo ausente)
      shell: cmd
      run: dotnet run --project Tools\CompressShaders\CompressShaders.csproj --configuration Release

    - name: 3. Compilar Solucao Whisper Completa
      shell: cmd
      run: msbuild Whisper.sln /p:Configuration=Release /p:Platform=x64 /v:minimal /m /fl /flp:logfile=errors.log;errorsonly   # <--- ALTERADO AQUI

    - name: Disponibilizar executaveis para Download
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Whisper-Binaries
        path: |
          **/x64/Release/main.exe
          **/x64/Release/WhisperDesktop.exe
          **/x64/Release/*.dll

    - name: Enviar log se falhar
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: log-de-erros
        path: errors.log
        if-no-files-found: ignore
