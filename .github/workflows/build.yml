name: Compilar WhisperDesktopNG (GGML)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - uses: microsoft/setup-msbuild@v2
    - uses: nuget/setup-nuget@v2

    - name: Restaurar pacotes
      run: |
        nuget restore Whisper.sln
        dotnet restore Whisper.sln

    - name: Compilar shaders
      run: msbuild ComputeShaders\ComputeShaders.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Compactar shaders
      run: dotnet run --project Tools\CompressShaders\CompressShaders.csproj --configuration Release

    # Compilação principal com MSBuild (resolve dependências)
    - name: Compilar solução completa
      run: msbuild Whisper.sln /p:Configuration=Release /p:Platform=x64 /v:minimal /m

    # Fallback: se o WhisperDesktop ainda falhar, copiar whisperWindows.h e recompilar
    - name: Fallback para WhisperDesktop (se necessário)
      if: failure()
      run: |
        # Localiza whisperWindows.h (gerado pelo Whisper)
        $wh = Get-ChildItem -Recurse -Filter whisperWindows.h | Select-Object -First 1
        if ($wh) {
          Copy-Item $wh.FullName Examples\WhisperDesktop\
          msbuild Examples\WhisperDesktop\WhisperDesktop.vcxproj /p:Configuration=Release /p:Platform=x64 /p:AdditionalIncludeDirectories="$($wh.DirectoryName);%(AdditionalIncludeDirectories)"
        } else {
          Write-Host "whisperWindows.h não encontrado; verifique a compilação do Whisper"
        }

    # Listagem de todos os binários (PowerShell)
    - name: Listar arquivos gerados
      shell: pwsh
      run: |
        Write-Host "=== DLLs ==="
        Get-ChildItem -Recurse -Filter *.dll | ForEach-Object { $_.FullName }
        Write-Host "=== EXEs ==="
        Get-ChildItem -Recurse -Filter *.exe | ForEach-Object { $_.FullName }

    # Upload de todos os .dll e .exe encontrados
    - name: Upload dos binários
      uses: actions/upload-artifact@v4
      with:
        name: WhisperDesktopNG-Binaries
        path: |
          **/Release/*.dll
          **/Release/*.exe
          **/x64/Release/*.dll
          **/x64/Release/*.exe
