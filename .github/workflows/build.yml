name: Compilar WhisperDesktop

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar Codigo
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Instalar C++ ATL no Visual Studio
      run: |
        $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
        $installer = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
        Write-Host "Instalando componente ATL no Visual Studio..."
        $proc = Start-Process -FilePath $installer -ArgumentList "modify --installPath `"$vsPath`" --add Microsoft.VisualStudio.Component.VC.ATL --passive --norestart" -Wait -PassThru
        Write-Host "Instalacao finalizada com codigo: $($proc.ExitCode)"
      shell: powershell

    - name: Configurar Ambiente MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configurar MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configurar NuGet
      uses: nuget/setup-nuget@v2

    - name: Restaurar Pacotes
      run: nuget restore Examples\WhisperDesktop\WhisperDesktop.vcxproj

    - name: Compilar WhisperDesktop
      run: msbuild Examples\WhisperDesktop\WhisperDesktop.vcxproj /p:Configuration=Release /p:Platform="x64"

    - name: Salvar Executavel
      uses: actions/upload-artifact@v4
      with:
        name: WhisperDesktop-Pronto
        path: |
          **/x64/Release/**/*
          **/Release/**/*
